name: Update BTC Price Data

on:
  schedule:
    - cron: '0 8 * * *'   # daily at 08:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation warning

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to commit and push btc-prices.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Kaggle CLI
        run: pip install kaggle --quiet

      - name: Fetch BTC prices (Kaggle + Kraken gap fill)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python scripts/fetch_btc_prices.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/btc-prices.json
          git diff --cached --quiet && echo "No new data — nothing to commit." || (
            git commit -m "chore: update BTC price data $(date -u +%Y-%m-%d) [skip ci]" &&
            git pull --rebase &&
            git push
          )
